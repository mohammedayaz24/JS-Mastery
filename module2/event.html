<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events and Event Handling</title>
</head>
<style>
    h2{
        color: red;
        text-transform: Capitalize;
    }
    *{
        padding: 0;
        margin: 0;
    }

    body,html{
        height: 100%;
        width: 100%;
    }
    #main{
        font-size: large;
        color: rgb(114, 114, 132);
        font-size: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }

    #main1{
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #fileInput{
        display: none;
    }

    #input{
        width: 200px;
        height: 50px;
        background-color: rgb(114, 114, 132);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: large;
        border-radius: 25px;
    }
    #input:hover{
        cursor: pointer;
        background-color: rgb(0, 0, 0);
    }

    #nav{
        width: 100%;
        height: 50px;
        background-color: rgb(114, 114, 132);
        display: flex-box;
        display: column;
        align-items: center;
        justify-content: center;
    }

  


</style>
<body>
    <p style="font-size: medium;"><b>Asif</b> : Ayisha is mine bro</p>
    <input type="text" id="name" placeholder="Enter your name">
  

    <h2 id="selectedValue">select the options</h2>
    <select>
        <option selected disabled>Select an option</option>
        <option value="1">Option 1</option>
        <option value="2">Option 2</option>
        <option value="3">Option 3</option>
    </select>
    
    <div id="main1">
        <h1 id="main">a</h1>
    </div>

    <div id="main1">
        <input type="file" id="fileInput">
        <div id="input">Upload file</div>
    </div>

    <form>
        <input type="text" id="name1" placeholder="Enter your name">
        <input type="email" id="email" placeholder="Enter your email">
        <input type="submit" value="Submit">
    </form>


    <div id="nav">
        <a href="#">Home</a><a href="#">About</a><a href="#">Contact</a>
        <button id="btn">Click me</button>
    </div>

    <div class="a">
        <div class="b">
            <div class="c">
                <button id="btn1">Click me</button>
            </div>
        </div>
    </div>
    <script src="event.js"></script>
