<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timers and Controllers</title>
</head>
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    width:360px;
    padding:35px;
    text-align:center;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    box-shadow:0 8px 32px rgba(0,0,0,.25);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h2{
    color:white;
    margin-bottom:10px;
}

#status{
    color:#ececec;
    margin-bottom:25px;
}

.progress-bar{
    width:100%;
    height:14px;
    background:rgba(255,255,255,.2);
    border-radius:30px;
    overflow:hidden;
    margin-bottom:15px;
}

#progress{
    width:0%;
    height:100%;
    background:white;
    border-radius:30px;
    transition:.3s;
}

#percentage{
    color:white;
    margin-bottom:25px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:white;
    color:#5a4fcf;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    background:#f3f3f3;
}
</style>
<body>

     <div class="card">
        <div class="icon">⬇️</div>
        <h2>Downloading..</h2>
        <p id="status">Preparing Download...</p>
        <div class="progress-bar">
            <div id="progress"></div>
        </div>
        <h3 id="percentage">0%</h3>
 
    </div>
    


    <script src="timers.js" ></script>
</body>
</html>
